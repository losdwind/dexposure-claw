name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ruff (lint)
        uses: astral-sh/ruff-action@v3
        with:
          args: "check dexposure_fm"

      - name: Ruff (format)
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check dexposure_fm"
