name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile importable Python packages
        run: python -m compileall claw/src/dexposure_claw paper/dexposure_agent

  claw-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check npm package contents
        run: npm --prefix ./claw run pack:check
