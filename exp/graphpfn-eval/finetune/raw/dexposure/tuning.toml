# DeXposure 超参数搜索配置
# 用法: uv run bin/go.py exp/graphpfn-eval/finetune/raw/dexposure/tuning.toml --force

seed = 0
n_trials = 50
sampler_type = "BruteForceSampler"
function = "bin.graphpfn_evaluate.main"

[space]
seed = 0
amp = true
checkpoint_name = "graphpfn-v1"  # 使用预训练模型
unfreeze_all = true
n_steps = -1
epoch_size = 10
patience = 4
seq_len_pred = 1024
min_train_ratio = 0.5

[space.data]
cache = false
path = "data/"
setting = "transductive"

# DeXposure 特定参数
time_idx = 0
split_strategy = "temporal"
label_idx = 0

# 特征预处理 (DeXposure 只有 num_features)
num_policy = "noisy-quantile-normal"

# 图结构编码
[space.data.graph_encodings]
preprocess = "standard"

[space.data.graph_encodings.lap_pe]
k = 10

[space.data.graph_encodings.degree]
log = true

[space.data.graph_encodings.pagerank]
log = true

[space.optimizer]
type = "AdamW"
lr = [
    "_tune_",
    "categorical",
    [0.00003, 0.0001, 0.0003],
]
weight_decay = 0.0

[space.pearl]
batch_size = 64
output_dim = 16

[space.pearl.backbone]
type = "BaseGraphBackbone"
conv_name = "gcn"
norm_name = "layer_norm"
residual = true
n_layers = 4
d_hidden = [
    "_tune_",
    "categorical",
    [128, 256],
]
dropout = 0.1
activation = "gelu"
