# DeXposure 超参数搜索配置
# 用于自动调优 GraphPFN 在 DeXposure 数据集上的性能
#
# 用法：
#   cd graphpfn
#   uv run bin/go.py exp/graphpfn-eval/finetune/raw/dexposure/tuning.toml --force
#
# 搜索完成后，最佳配置会自动保存到 report.json

seed = 0
n_trials = 100  # 超参数搜索试验次数
sampler_type = "BruteForceSampler"  # 搜索算法
function = "bin.graphpfn_evaluate.main"

[space]
seed = 0
amp = true
checkpoint_name = "none"  # 从头训练
unfreeze_all = true
n_steps = -1  # 训练直到早停
epoch_size = 10  # 搜索时使用较小的 epoch_size 以加快速度
patience = 4  # 搜索时使用较小的 patience
seq_len_pred = 1000
min_train_ratio = 0.5

[space.data]
cache = false
path = "data/"
setting = "transductive"

# DeXposure 特定参数
time_idx = 0
split_strategy = "temporal"
label_idx = 0

# 图结构编码
[space.data.graph_encodings]
preprocess = "standard"

[space.data.graph_encodings.lap_pe]
k = [
    "_tune_",
    "categorical",
    [5, 10, 15, 20],  # 搜索不同的 k 值
]

[space.data.graph_encodings.degree]
log = true

[space.data.graph_encodings.pagerank]
log = true

# 优化器配置（学习率调优）
[space.optimizer]
type = "AdamW"
lr = [
    "_tune_",
    "categorical",
    [
        0.00001,
        0.00003,
        0.0001,
        0.0003,
        0.001,
    ],
]
weight_decay = 0.0

# PEARL 配置
[space.pearl]
batch_size = 64
output_dim = 16

# GraphPFN 主干网络
[space.pearl.backbone]
type = "BaseGraphBackbone"
conv_name = "gcn"
norm_name = "layer_norm"
residual = true
n_layers = [
    "_tune_",
    "categorical",
    [3, 4, 5],  # 搜索不同的层数
]
d_hidden = [
    "_tune_",
    "categorical",
    [128, 256, 512],  # 搜索不同的隐藏层维度
]
dropout = [
    "_tune_",
    "categorical",
    [0.0, 0.1, 0.2],  # 搜索不同的 dropout
]
activation = "gelu"
