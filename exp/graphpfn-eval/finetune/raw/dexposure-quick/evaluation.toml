# DeXposure Week 00 快速测试配置
# 用于快速验证和调试
#
# 用法：
#   cd graphpfn
#   .venv/bin/python bin/evaluate.py exp/graphpfn-eval/finetune/raw/dexposure-quick/evaluation.toml

function = "bin.graphpfn_evaluate.main"
n_seeds = 1

[base_config]
patience = 10
amp = false  # 禁用 AMP 以避免兼容性问题
n_steps = 5000  # 固定训练步数（不使用早停）
epoch_size = 50  # 较小的 epoch_size
min_train_ratio = 0.5
seq_len_pred = 1000

checkpoint_name = "none"  # 从头训练
unfreeze_all = true

# 优化器配置
[base_config.optimizer]
type = "AdamW"
lr = 0.001  # 较大的学习率用于快速测试
weight_decay = 0.0

# 数据配置
[base_config.data]
cache = false
path = "data/"
setting = "transductive"

# DeXposure 特定参数
time_idx = 0  # 时间索引
split_strategy = "temporal"
label_idx = 0  # 变化率

# 图结构编码（简化版）
[base_config.data.graph_encodings]
preprocess = "standard"

# 只使用度数编码（简化）
[base_config.data.graph_encodings.degree]
log = true
